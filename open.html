<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening CookE...</title>
  <meta name="description" content="Opening the CookE app on your device.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="assets/icon/CookE_Icon_512.jpg" type="image/jpeg">
  <meta name="theme-color" content="#C48A1E">

  <!--
    This page is the universal CTA target for CookE marketing emails and
    transactional messages. A single URL (https://getcooke.app/open) handles
    every recipient: mobile users get redirected into the app (if installed)
    or to their platform's store; desktop users get a "use your phone" hint.

    Future upgrade path: add /.well-known/apple-app-site-association and
    /.well-known/assetlinks.json + entitlements in the mobile app, and
    iOS/Android will intercept this URL as a Universal Link / App Link BEFORE
    the browser loads this page — opening the installed app directly. The
    HTML and JS below become the fallback for the "app not installed" case,
    which is exactly what we want.
  -->

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F5EFE1;
      color: #1E1A14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .logo {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(30, 26, 20, 0.12);
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }
    p {
      color: #3A3530;
      font-size: 1rem;
      line-height: 1.6;
      max-width: 380px;
    }
    .spinner {
      margin-top: 1.75rem;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(196, 138, 30, 0.2);
      border-top-color: #C48A1E;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .desktop-card {
      margin-top: 1.5rem;
      padding: 1.25rem 1.5rem;
      background: rgba(196, 138, 30, 0.08);
      border-radius: 12px;
      max-width: 420px;
    }
    .desktop-card a {
      color: #A87318;
      text-decoration: none;
      font-weight: 600;
    }
    .desktop-card a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <img class="logo" src="assets/icon/CookE_Icon_512.jpg" alt="CookE">
  <h1 id="headline">Opening CookE...</h1>
  <p id="subtext">One moment while we hand you off to the app.</p>
  <div class="spinner" id="spinner"></div>

  <div class="desktop-card hidden" id="desktop-card">
    <p>Open this link on your phone to download CookE, or visit <a href="https://getcooke.app">getcooke.app</a> to learn more.</p>
  </div>

  <script>
    (function () {
      var IOS_URL = 'https://apps.apple.com/app/id6760226469';
      var ANDROID_URL = 'https://play.google.com/store/apps/details?id=com.cooke.app';
      var IOS_SCHEME = 'cooke://';
      var FALLBACK_MS = 1500;

      var ua = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);
      var isMobile = isIOS || isAndroid;

      if (!isMobile) {
        // Desktop (or unknown): show a "use your phone" message, no auto-redirect.
        document.getElementById('headline').textContent = 'CookE is a mobile app';
        document.getElementById('subtext').classList.add('hidden');
        document.getElementById('spinner').classList.add('hidden');
        document.getElementById('desktop-card').classList.remove('hidden');
        return;
      }

      if (isAndroid) {
        // Chrome on Android blocks raw custom-scheme navigation from JS as an
        // anti-abuse measure. The official way to launch an app from a web
        // page is the intent:// URI format, which includes the package name
        // so Chrome can verify + natively handle the "not installed" case
        // via S.browser_fallback_url. No setTimeout needed — Chrome figures
        // out whether the app is installed in real time.
        //
        // See: https://developer.chrome.com/docs/android/intents/
        var intentUrl =
          'intent://home#Intent;' +
          'scheme=cooke;' +
          'package=com.cooke.app;' +
          'S.browser_fallback_url=' + encodeURIComponent(ANDROID_URL) + ';' +
          'end';
        window.location.replace(intentUrl);
        return;
      }

      // iOS: Safari is more lenient and accepts JS-initiated custom scheme
      // navigation. The document.hidden check prevents the fallback timer
      // from firing after the app successfully took focus.
      window.location.href = IOS_SCHEME;
      setTimeout(function () {
        if (!document.hidden) {
          window.location.replace(IOS_URL);
        }
      }, FALLBACK_MS);
    })();
  </script>
</body>
</html>
